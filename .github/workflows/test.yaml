jobs:
  eval:
    name: Evaluate all jobs
    runs-on: ubuntu-latest
    outputs:
      stdout: ${{ steps.nix-eval-jobs.outputs.stdout }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # main
    - name: Collect all jobs
      id: nix-eval-jobs
      run: |
        {
          echo 'stdout<<EOF'
          nix-shell nix/ci-shell.nix --run eval-checks -I nixpkgs=channel:nixos-unstable
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
  build:
    needs: [ eval ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        derivation: ${{ fromJson(needs.eval.outputs.stdout) }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # main
    - name: Build ${{ matrix.derivation.attr }}
      run: nix-build ./nix/release.nix -A ${{ matrix.derivation.attr }}
      if: ${{ ! matrix.derivation.isCached }}
  build-status:
    needs: [ build ]
    name: Build status
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: ${{ !contains(needs.build.result, 'failure') }}
name: '[Portail] Run test suite'
on:
  pull_request:
  push:
    branches:
    - main
